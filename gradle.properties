# ── Gradle JVM 参数 ──────────────────────────────────
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# 不再硬编码 JDK 路径，由 Android Studio 的 Gradle JDK 设置统一管理

# ── Android 构建配置 ─────────────────────────────────
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# ── 国内网络优化 ─────────────────────────────────────
# 启用并行下载，加速依赖拉取
org.gradle.parallel=true
# Gradle 缓存目录指向 D 盘纯英文路径（无空格无中文）
org.gradle.user.home=D:/.gradle

# 加大 HTTP 超时时间（毫秒），避免大依赖下载超时
org.gradle.internal.http.socketTimeout=120000
org.gradle.internal.http.connectionTimeout=120000
# 禁用 Gradle 遥测（减少不必要的网络请求）
org.gradle.internal.telemetry.enabled=false

# ── 强制 Java 临时目录指向纯英文路径（杜绝 C:\Users\佘 中文路径）──
systemProp.java.io.tmpdir=D:/Temp

# ── 确保没有残留代理设置（有则删除或注释掉）──────────
# systemProp.http.proxyHost=
# systemProp.http.proxyPort=
# systemProp.https.proxyHost=
# systemProp.https.proxyPort=
